<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ちょうAR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: sans-serif;
      text-align: center;
    }
    h1 {
      font-size: 1.3rem;
      margin-top: 16px;
      margin-bottom: 8px;
    }
    p {
      margin: 0 16px 12px 16px;
      font-size: 0.95rem;
    }
    model-viewer {
      width: 100%;
      height: 75vh;
      background: #ffffff;
    }
    .ar-button {
      position: absolute;
      top: 16px;
      right: 16px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>ちょうAR</h1>
  <p>ARボタンを押して、ちょうをおへやに出してみよう。</p>

  <model-viewer
    src="butterfly.glb"
    ios-src="butterfly.usdz"
    alt="ちょうの3Dモデル"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
   

    <button slot="ar-button" class="ar-button">ARでみる</button>
  </model-viewer>
</body>
</html>
