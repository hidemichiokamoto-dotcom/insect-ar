<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ちょうAR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 1.4rem;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    p {
      margin: 0 16px 12px 16px;
      font-size: 1rem;
      line-height: 1.5;
    }

    model-viewer {
      width: 100%;
      height: 78vh;
      background: #ffffff;
      position: relative;
    }

    .ar-button {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #ff8c42;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
    }

    .ar-button:hover {
      transform: scale(1.03);
    }

    .ar-badge {
      display: block;
      font-size: 12px;
      font-weight: normal;
      margin-top: 2px;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <h1>ちょうAR</h1>
  <p>ボタンを押して、ちょうをARで見てみよう。</p>

  <model-viewer
    src="butterfly.glb"
    ios-src="butterfly.usdz"
    alt="ちょうの3Dモデル"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls>

    <button slot="ar-button" class="ar-button">
      ARでみる
      <span class="ar-badge">View in AR</span>
    </button>
  </model-viewer>
</body>
</html>
